---
# Global defaults. Override per client in host_vars/<client>.yml

timezone: "UTC"
deploy_user: "deploy"

# SSH
ssh_port: 22
ssh_max_auth_tries: 3

# Your office/home static IP kept as break-glass direct SSH access.
# Set to empty string to disable.
office_static_ip: ""

# Paranoia: standard | high
paranoia_level: "standard"

# Backups
backup_hour: "3"
backup_minute: "15"
backup_retention_daily: 7
backup_retention_weekly: 4
backup_retention_monthly: 6

# Alerts (Telegram bot)
telegram_bot_token: "CHANGE_ME"
telegram_chat_id: "CHANGE_ME"

# Watcher
watcher_mode: "alert"        # alert | active
watcher_window_seconds: 60
# Extra trusted source IPs/CIDRs that never trigger the watcher
# (office_static_ip is always included automatically).
watcher_whitelist_ips: []
# Sessions without a TTY (scp, rsync, ansible, git) are skipped.
watcher_skip_non_interactive: true

# Detection suite (all default to alert mode via watcher_mode)
# Reverse-shell / unexpected-shell scanner (watches the process table).
revshell_enabled: true
# Recon-burst detector (watches auditd for enumeration bursts). This is
# the robust, vector-independent detector - it catches an intruder
# "looking around" however they got in.
recon_enabled: true
# SSH login-pattern watcher (the "tripwire second factor"). EXPERIMENTAL
# and OFF by default: reacting to a login and then inspecting the session
# is racy under concurrent same-IP logins (it can misattribute a session
# and false-positive on automation). Enable only if you understand this
# and whitelist your automation/ops IPs via watcher_whitelist_ips. The
# recon and reverse-shell detectors cover the real breach cases.
ssh_pattern_watcher_enabled: false

# Egress lockdown: default-deny OUTBOUND traffic, allowing only
# DNS/NTP/HTTP/HTTPS plus egress_allow_extra. Stops arbitrary-high-port
# reverse shells. Off by default because it can break apps that call
# external services on non-standard ports. 443-tunnelled C2 still needs
# the detection layers.
egress_lockdown: false
# Extra outbound ports to permit when egress_lockdown is on, e.g.
#   - { port: 587, proto: tcp }   # SMTP submission
egress_allow_extra: []

# Let's Encrypt registration email for certbot
letsencrypt_email: "CHANGE_ME@example.com"

# Name that appears on the generated security report
report_prepared_by: "Your Company"
